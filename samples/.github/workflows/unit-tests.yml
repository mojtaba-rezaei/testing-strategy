name: Unit Tests

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'tests/unit/**'
      - '**.csproj'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'tests/unit/**'
      - '**.csproj'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better coverage reports

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v3
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests with coverage
        run: |
          dotnet test tests/unit/**/*.UnitTests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --verbosity normal \
            --logger "trx;LogFileName=test-results.trx" \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:Threshold=80 \
            /p:ThresholdType=line

      - name: Generate coverage report
        if: always()
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:./TestResults/**/coverage.cobertura.xml \
            -targetdir:./CoverageReport \
            -reporttypes:"Html;Cobertura;MarkdownSummaryGithub" \
            -filefilters:-*.g.cs

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./TestResults/**/coverage.cobertura.xml
          flags: unittests
          name: codecov-unit-tests
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: |
            TestResults/**/*.trx
          check_name: Unit Test Results
          comment_mode: always

      - name: Add coverage comment to PR
        if: github.event_name == 'pull_request'
        run: |
          if [ -f CoverageReport/SummaryGithub.md ]; then
            echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
            cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: CoverageReport/
          retention-days: 7

      - name: Upload test results artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

      - name: Check coverage threshold
        run: |
          COVERAGE_FILE=$(find ./TestResults -name "coverage.cobertura.xml" | head -1)
          if [ -z "$COVERAGE_FILE" ]; then
            echo "❌ Coverage file not found!"
            exit 1
          fi
          
          # Extract line coverage percentage
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]*' "$COVERAGE_FILE" | head -1)
          COVERAGE=$(echo "$LINE_RATE * 100" | bc)
          COVERAGE_INT=${COVERAGE%.*}
          
          echo "Line Coverage: $COVERAGE_INT%"
          
          if [ "$COVERAGE_INT" -lt 80 ]; then
            echo "❌ Coverage ($COVERAGE_INT%) is below threshold (80%)"
            exit 1
          else
            echo "✅ Coverage threshold met: $COVERAGE_INT%"
          fi

      - name: Test Summary
        if: always()
        run: |
          echo "=========================================="
          echo "Unit Test Summary"
          echo "=========================================="
          echo "Workflow: ${{ github.workflow }}"
          echo "Run Number: ${{ github.run_number }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "=========================================="

  # Optional: Run tests on multiple operating systems
  multi-platform-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        run: |
          dotnet test tests/unit/**/*.UnitTests.csproj \
            --configuration Release \
            --no-build \
            --no-restore \
            --verbosity normal \
            --logger "trx;LogFileName=test-results-${{ matrix.os }}.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/
          retention-days: 3
